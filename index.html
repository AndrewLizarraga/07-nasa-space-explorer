<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <main class="container" id="main-content">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <h1>Space Explorer</h1>
    </header>

    <div class="filters">
      <label for="startDate" class="sr-only">Start date</label>
      <input type="date" id="startDate" />
      <label for="endDate" class="sr-only">End date</label>
      <input type="date" id="endDate" />
      <button>Get Space Images</button>
    </div>

    <section id="space-fact" class="space-fact" aria-live="polite"></section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🪐</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>

    <div id="pagination" class="pagination"></div>
  </main>

  <div id="modal" class="modal-hidden">
    <div class="modal-content">
      <span id="modal-close" class="modal-close">&times;</span>
      <img id="modal-image" src="" alt="Space Image" />
      <h2 id="modal-title"></h2>
      <p id="modal-date"></p>
      <h3 class="modal-description-heading">Description</h3>
      <p id="modal-description"></p>
      <p id="modal-copyright" class="modal-copyright"></p>
    </div>
  </div>


  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
